<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Giới thiệu sản phẩm</title>
</head>
<body>

<h1>Giới thiệu sản phẩm</h1>

<section>
    <h2>Hình ảnh sản phẩm</h2>

    <figure>
        <img src="img1.jpg" alt="iPhone 16 Pro Max mặt trước màu đen"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>iPhone 16 Pro Max - Mặt trước</figcaption>
    </figure>

    <figure>
        <img src="img2.jpg" alt="iPhone 16 Pro Max mặt lưng Titan"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>Mặt lưng Titan cao cấp</figcaption>
    </figure>

    <figure>
        <img src="img3.jpg" alt="Cụm camera iPhone 16 Pro Max"
             loading="lazy"
             style="max-width:100%; height:auto;">
        <figcaption>Camera nâng cấp vượt trội</figcaption>
    </figure>
</section>

<section>
    <h2>Video giới thiệu (YouTube)</h2>
    <iframe width="560" height="315"
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        title="Video sản phẩm"
        frameborder="0"
        allowfullscreen>
    </iframe>
</section>

<section>
    <h2>Video sản phẩm</h2>
    <video controls poster="poster.jpg" style="max-width:100%; height:auto;">
        <source src="video.mp4" type="video/mp4">
        <source src="video.webm" type="video/webm">
        Trình duyệt không hỗ trợ video.
    </video>
</section>

<section>
    <h2>Nhạc nền giới thiệu</h2>
    <audio controls>
        <source src="audio.mp3" type="audio/mpeg">
        Trình duyệt không hỗ trợ audio.
    </audio>
</section>

<section>
    <h2>Logo (SVG)</h2>
    <svg width="120" height="120">
        <circle cx="60" cy="60" r="50" fill="blue" />
        <text x="60" y="70" text-anchor="middle" fill="white" font-size="20">
            Shop
        </text>
    </svg>
</section>

</body>
</html>
